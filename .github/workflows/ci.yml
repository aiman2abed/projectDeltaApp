name: Spirelay CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Backend Deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest # Ensure pytest is installed
      - name: Run Tests
        run: |
          cd backend
          pytest test_srs.py